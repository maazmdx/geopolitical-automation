name: Antigravity News Automation

on:
  schedule:
    # Changed from 30 mins to every 2 hours to prevent Apify API limits from draining
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Restore usage trackers cache
        uses: actions/cache@v4
        with:
          path: |
            posted_links.json
            ai_usage.json
            run_tracker.json
          key: antigravity-trackers-${{ github.run_id }}
          restore-keys: |
            antigravity-trackers-

      - name: Run antigravity news automation
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_TOKEN_NEW: ${{ secrets.APIFY_TOKEN_NEW }}
          SCRAPE_CREATORS_API_KEY: ${{ secrets.SCRAPE_CREATORS_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          python main.py

      - name: Commit trackers updates
        run: |
          if [ -f posted_links.json ]; then
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            
            # Added run_tracker.json so folder DD_NN numbering works perfectly
            git add posted_links.json ai_usage.json run_tracker.json
            
            git diff --cached --quiet || git commit -m "chore: update antigravity trackers [skip ci]"
            
            # Flawless git pull to guarantee NO merge conflicts
            git pull --rebase origin main
            
            git push origin main
          fi

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: antigravity-output-${{ github.run_number }}
          path: output/
          retention-days: 7
          
